# Lightweight iPad standard config for KataGo analysis.
# The app still uses analysis.cfg unless Swift startup code is explicitly switched.

logDir = analysis_logs
logErrorsAndWarnings = true

reportAnalysisWinratesAs = BLACK

maxVisits = 200

numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 4

nnMaxBatchSize = 32
nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 17
nnRandomize = true
